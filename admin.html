<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Menu Admin | Level 3 Rooftop</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Cinzel&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--burgundy:#6B0F1A;--gold:#C9A96E;--black:#0A0A0A;--charcoal:#1A1A1A;--white:#fff;--font-serif:'Cormorant Garamond',Georgia,serif;--font-display:'Cinzel',serif;--font-sans:'Jost',sans-serif;}
body{background:var(--black);color:var(--white);font-family:var(--font-sans);font-weight:300;min-height:100vh;}
a{color:var(--gold);}
header{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 2rem;border-bottom:1px solid rgba(201,169,110,0.15);}
.logo{font-family:var(--font-display);font-size:0.95rem;letter-spacing:0.2em;color:var(--gold);text-decoration:none;}
.wrap{max-width:900px;margin:0 auto;padding:2rem;}
h1{font-family:var(--font-display);font-size:1.6rem;font-weight:400;margin-bottom:0.5rem;}
.sub{color:rgba(255,255,255,0.45);font-size:0.9rem;line-height:1.6;margin-bottom:1.5rem;}
.panel{background:var(--charcoal);border:1px solid rgba(255,255,255,0.08);padding:2rem;margin-bottom:1.5rem;}
label{display:block;font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:0.4rem;}
input[type=text],input[type=password],textarea{width:100%;background:#111;border:1px solid rgba(255,255,255,0.12);color:var(--white);padding:0.75rem 1rem;font-family:var(--font-sans);font-size:0.9rem;margin-bottom:1rem;}
textarea{min-height:80px;resize:vertical;}
.btn{display:inline-block;padding:0.75rem 1.5rem;background:var(--burgundy);border:1px solid #C4394F;color:var(--white);font-family:var(--font-sans);font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;text-decoration:none;}
.btn:hover{opacity:0.9;}
.btn:disabled{opacity:0.5;cursor:not-allowed;}
.btn-ghost{background:transparent;border-color:rgba(255,255,255,0.2);}
.btn-sm{padding:0.45rem 0.9rem;font-size:0.62rem;}
.btn-danger{border-color:#8B1A28;background:#4A0A12;}
.toolbar{display:flex;flex-wrap:wrap;gap:0.75rem;margin-bottom:1rem;position:sticky;top:0;z-index:10;background:var(--black);padding:0.75rem 0;border-bottom:1px solid rgba(255,255,255,0.06);}
.status{font-size:0.88rem;margin-bottom:1.25rem;padding:0.65rem 0;min-height:1.4rem;}
.status.ok{color:#8ecf8e;}
.status.err{color:#C4394F;}
.cat{border:1px solid rgba(255,255,255,0.08);margin-bottom:1rem;scroll-margin-top:5rem;transition:border-color 0.4s,box-shadow 0.4s;}
.cat.open{border-color:rgba(201,169,110,0.35);}
.cat.cat-new{border-color:var(--gold);box-shadow:0 0 0 1px rgba(201,169,110,0.45);}
.cat-head{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:1rem 1.25rem;background:#141414;cursor:pointer;user-select:none;}
.cat-head h2{font-family:var(--font-serif);font-size:1.15rem;font-weight:500;}
.cat-chevron{color:var(--gold);font-size:0.75rem;transition:transform 0.25s;}
.cat.open .cat-chevron{transform:rotate(180deg);}
.cat-body{padding:1.25rem;display:none;}
.cat.open .cat-body{display:block;}
.item{border-top:1px solid rgba(255,255,255,0.06);padding:1.25rem 0;scroll-margin-top:5rem;}
.item.item-new{background:rgba(201,169,110,0.04);margin:0 -1.25rem;padding-left:1.25rem;padding-right:1.25rem;}
.item:first-child{border-top:none;padding-top:0;}
.item-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 1rem;}
.photo-box{display:flex;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap;}
.photo-preview-wrap{width:120px;aspect-ratio:4/3;background:#111;border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.item-preview{width:100%;height:100%;object-fit:cover;display:block;}
.photo-placeholder{font-size:0.7rem;color:rgba(255,255,255,0.3);text-align:center;padding:0.5rem;}
.photo-actions{display:flex;flex-direction:column;gap:0.5rem;}
.upload-label{cursor:pointer;margin:0;}
.hidden-file{display:none;}
.upload-hint{font-size:0.75rem;color:rgba(255,255,255,0.4);}
.item-actions{display:flex;gap:0.5rem;margin-top:0.5rem;flex-wrap:wrap;}
.err{color:#C4394F;font-size:0.85rem;margin-top:0.5rem;}
.hidden{display:none;}
.empty-cats{text-align:center;padding:3rem 1rem;color:rgba(255,255,255,0.4);border:1px dashed rgba(255,255,255,0.12);}
@media(max-width:700px){.item-grid{grid-template-columns:1fr;}.wrap{padding:1.25rem;}}
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">LEVEL 3 ADMIN</a>
</header>

<div class="wrap">
  <div id="loginView">
    <h1>Menu Admin</h1>
    <p class="sub">Sign in to edit the menu.</p>
    <div class="panel">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
      <p class="err hidden" id="loginErr">Incorrect password.</p>
      <button class="btn" type="button" id="loginBtn">Sign In</button>
    </div>
  </div>

  <div id="editorView" class="hidden">
    <h1>Edit Menu</h1>
    <p class="sub">Make your changes, then click <strong>Save</strong>. Use <strong>+ Category</strong> or <strong>Add dish</strong> inside a category.</p>

    <div class="toolbar">
      <button class="btn" type="button" id="saveBtn">Save</button>
      <button class="btn btn-ghost" type="button" id="addCatBtn">+ Category</button>
      <a class="btn btn-ghost" href="menu.html" target="_blank">Preview</a>
      <button class="btn btn-ghost" type="button" id="logoutBtn">Sign Out</button>
    </div>

    <p class="status" id="statusMsg"></p>
    <div id="categories"></div>
  </div>
</div>

<script>
const LOCAL_ADMIN_PASSWORD = "level3menu";
const SESSION_KEY = "level3_menu_admin";
const MAX_IMAGE_BYTES = 4 * 1024 * 1024;

let menuData = { categories: [] };
let useLocalAuth = false;
let openCategories = new Set();
let pendingFocus = null;
let pendingMessage = "";

const loginView = document.getElementById("loginView");
const editorView = document.getElementById("editorView");
const categoriesEl = document.getElementById("categories");
const statusMsg = document.getElementById("statusMsg");

function setStatus(msg, type) {
  statusMsg.textContent = msg;
  statusMsg.className = "status" + (type ? " " + type : "");
}

function isLoggedIn() {
  return sessionStorage.getItem(SESSION_KEY) === "1";
}

function showLogin() {
  loginView.classList.remove("hidden");
  editorView.classList.add("hidden");
}

function showEditor() {
  loginView.classList.add("hidden");
  editorView.classList.remove("hidden");
}

async function loadMenuData() {
  try {
    const res = await fetch("/api/menu");
    if (res.ok) {
      menuData = await res.json();
      if (!menuData.categories) menuData = { categories: menuData };
      return;
    }
  } catch (_) {}

  const res = await fetch("content/menu.json");
  if (!res.ok) throw new Error("Could not load menu");
  menuData = await res.json();
  if (!menuData.categories) menuData = { categories: menuData };
}

function esc(str) {
  return String(str ?? "")
    .replace(/&/g, "&amp;")
    .replace(/"/g, "&quot;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function encodeImagePath(path) {
  return path.split("/").map(encodeURIComponent).join("/");
}

function itemTemplate(ci, ii, item) {
  const isNew = pendingFocus?.type === "item" && pendingFocus.ci === ci && pendingFocus.ii === ii;
  return `
    <div class="item${isNew ? " item-new" : ""}" data-item data-ci="${ci}" data-ii="${ii}">
      <label>Photo</label>
      <div class="photo-box">
        <div class="photo-preview-wrap">
          ${item.image
            ? `<img class="item-preview" src="${encodeImagePath(item.image)}" alt="" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'photo-placeholder',textContent:'No photo'}))">`
            : `<div class="photo-placeholder">No photo</div>`}
        </div>
        <div class="photo-actions">
          <label class="btn btn-sm btn-ghost upload-label">
            ${item.image ? "Change photo" : "Upload photo"}
            <input type="file" accept="image/jpeg,image/png,image/webp,image/jpg" class="hidden-file" data-upload>
          </label>
          <span class="upload-hint" data-upload-hint>${item.image ? "Photo ready" : "JPG or PNG, max 4 MB"}</span>
        </div>
      </div>
      <label>Dish name</label>
      <input type="text" data-item-field="name" value="${esc(item.name)}" placeholder="e.g. Golden Plantain Cups">
      <label>Description</label>
      <textarea data-item-field="desc" placeholder="Short description of the dish">${esc(item.desc)}</textarea>
      <label>Badge <span style="text-transform:none;letter-spacing:0;color:rgba(255,255,255,0.35);">(optional)</span></label>
      <input type="text" data-item-field="badge" value="${esc(item.badge || "")}" placeholder="Signature, Popular…">
      <div class="item-actions">
        <button class="btn btn-sm btn-danger" type="button" data-remove-item>Remove dish</button>
      </div>
    </div>
  `;
}

function renderCategories() {
  if (!menuData.categories.length) {
    categoriesEl.innerHTML = `<div class="empty-cats">No categories yet. Click <strong>+ Category</strong> above to add one.</div>`;
    return;
  }

  categoriesEl.innerHTML = menuData.categories.map((cat, ci) => `
    <div class="cat${openCategories.has(ci) ? " open" : ""}${pendingFocus?.type === "category" && pendingFocus.ci === ci ? " cat-new" : ""}" data-ci="${ci}">
      <div class="cat-head" data-toggle>
        <h2>${esc(cat.group || "Untitled")} <span style="color:rgba(255,255,255,0.35);font-size:0.85rem;">(${cat.items.length} dish${cat.items.length === 1 ? "" : "es"})</span></h2>
        <span class="cat-chevron">▼</span>
      </div>
      <div class="cat-body">
        <div class="item-grid">
          <div>
            <label>Category name</label>
            <input type="text" data-field="group" value="${esc(cat.group)}" placeholder="e.g. Starters">
          </div>
          <div>
            <label>Subtitle</label>
            <input type="text" data-field="eyebrow" value="${esc(cat.eyebrow)}" placeholder="e.g. To Begin">
          </div>
        </div>
        <label>Description</label>
        <textarea data-field="intro" placeholder="Short intro for this section">${esc(cat.intro)}</textarea>
        <div class="item-actions" style="margin-bottom:1.25rem;">
          <button class="btn btn-sm" type="button" data-add-item>+ Add dish</button>
          <button class="btn btn-sm btn-danger" type="button" data-remove-cat>Remove category</button>
        </div>
        <div data-items>
          ${cat.items.length
            ? cat.items.map((item, ii) => itemTemplate(ci, ii, item)).join("")
            : `<p style="color:rgba(255,255,255,0.35);font-size:0.85rem;margin-bottom:1rem;">No dishes yet — click <strong>Add dish</strong>.</p>`}
        </div>
      </div>
    </div>
  `).join("");

  categoriesEl.querySelectorAll("[data-toggle]").forEach(head => {
    head.addEventListener("click", () => {
      const cat = head.closest(".cat");
      const ci = Number(cat.dataset.ci);
      if (openCategories.has(ci)) openCategories.delete(ci);
      else openCategories.add(ci);
      cat.classList.toggle("open");
    });
  });

  categoriesEl.querySelectorAll(".cat").forEach(catEl => {
    const ci = Number(catEl.dataset.ci);

    catEl.querySelectorAll("[data-field]").forEach(input => {
      input.addEventListener("input", () => {
        menuData.categories[ci][input.dataset.field] = input.value;
        if (input.dataset.field === "group") {
          catEl.querySelector(".cat-head h2").innerHTML =
            `${esc(input.value || "Untitled")} <span style="color:rgba(255,255,255,0.35);font-size:0.85rem;">(${menuData.categories[ci].items.length} dish${menuData.categories[ci].items.length === 1 ? "" : "es"})</span>`;
        }
      });
    });

    catEl.querySelector("[data-add-item]")?.addEventListener("click", () => {
      const ii = menuData.categories[ci].items.length;
      menuData.categories[ci].items.push({ name: "", desc: "", image: "" });
      openCategories = new Set([ci]);
      pendingFocus = { type: "item", ci, ii };
      pendingMessage = "New dish added — fill in the details below.";
      renderCategories();
    });

    catEl.querySelector("[data-remove-cat]")?.addEventListener("click", () => {
      if (!confirm(`Remove "${menuData.categories[ci].group}" and all its dishes?`)) return;
      menuData.categories.splice(ci, 1);
      openCategories = new Set([Math.min(ci, menuData.categories.length - 1)].filter(i => i >= 0));
      renderCategories();
      setStatus("Category removed. Click Save when ready.", "ok");
    });

    catEl.querySelectorAll("[data-item]").forEach(itemEl => {
      const ii = Number(itemEl.dataset.ii);

      itemEl.querySelectorAll("[data-item-field]").forEach(input => {
        input.addEventListener("input", () => {
          const field = input.dataset.itemField;
          if (field === "badge" && !input.value.trim()) {
            delete menuData.categories[ci].items[ii].badge;
          } else {
            menuData.categories[ci].items[ii][field] = input.value;
          }
        });
      });

      itemEl.querySelector("[data-upload]")?.addEventListener("change", async e => {
        const file = e.target.files?.[0];
        if (file) await handleImageUpload(file, ci, ii, itemEl);
        e.target.value = "";
      });

      itemEl.querySelector("[data-remove-item]")?.addEventListener("click", () => {
        menuData.categories[ci].items.splice(ii, 1);
        openCategories.add(ci);
        renderCategories();
        setStatus("Dish removed. Click Save when ready.", "ok");
      });
    });
  });

  applyPendingFocus();
}

function applyPendingFocus() {
  if (!pendingFocus) return;

  const message = pendingMessage;
  pendingMessage = "";

  requestAnimationFrame(() => {
    if (pendingFocus.type === "category") {
      const el = categoriesEl.querySelector(`[data-ci="${pendingFocus.ci}"]`);
      el?.scrollIntoView({ behavior: "smooth", block: "start" });
      el?.querySelector('[data-field="group"]')?.focus({ preventScroll: true });
    } else if (pendingFocus.type === "item") {
      const el = categoriesEl.querySelector(`[data-item][data-ci="${pendingFocus.ci}"][data-ii="${pendingFocus.ii}"]`);
      el?.scrollIntoView({ behavior: "smooth", block: "center" });
      el?.querySelector('[data-item-field="name"]')?.focus({ preventScroll: true });
    }
    if (message) setStatus(message, "ok");
    pendingFocus = null;
  });
}

function readFileBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function handleImageUpload(file, ci, ii, itemEl) {
  const hint = itemEl.querySelector("[data-upload-hint]");

  if (useLocalAuth) {
    setStatus("Photo upload only works on the live site.", "err");
    return;
  }

  if (file.size > MAX_IMAGE_BYTES) {
    setStatus("Image must be under 4 MB.", "err");
    return;
  }

  hint.textContent = "Uploading…";
  setStatus("Uploading photo…");

  try {
    const content = await readFileBase64(file);
    const res = await fetch("/api/upload", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: "include",
      body: JSON.stringify({ filename: file.name, content }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || "Upload failed");

    menuData.categories[ci].items[ii].image = data.path;
    openCategories.add(ci);
    pendingFocus = { type: "item", ci, ii };
    renderCategories();
    setStatus("Photo uploaded. Click Save to publish.", "ok");
  } catch (err) {
    hint.textContent = "Upload failed — try again";
    setStatus(err.message || "Could not upload photo.", "err");
  }
}

async function saveMenu() {
  const saveBtn = document.getElementById("saveBtn");
  saveBtn.disabled = true;
  setStatus("Saving…");

  menuData.categories.forEach(cat => {
    cat.items.forEach(item => {
      if (!item.badge?.trim()) delete item.badge;
    });
  });

  if (useLocalAuth) {
    setStatus("Saving only works on the live site.", "err");
    saveBtn.disabled = false;
    return;
  }

  try {
    const res = await fetch("/api/menu", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: "include",
      body: JSON.stringify(menuData),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || "Save failed");
    setStatus("Saved — your menu is now live.", "ok");
  } catch (err) {
    setStatus(err.message || "Could not save.", "err");
  } finally {
    saveBtn.disabled = false;
  }
}

document.getElementById("loginBtn").addEventListener("click", async () => {
  const pw = document.getElementById("password").value;
  document.getElementById("loginErr").classList.add("hidden");
  useLocalAuth = false;

  try {
    const res = await fetch("/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: "include",
      body: JSON.stringify({ password: pw }),
    });

    if (res.ok) {
      sessionStorage.setItem(SESSION_KEY, "1");
      initEditor();
      return;
    }

    if (res.status === 503 && pw === LOCAL_ADMIN_PASSWORD) {
      useLocalAuth = true;
      sessionStorage.setItem(SESSION_KEY, "1");
      initEditor();
      return;
    }

    document.getElementById("loginErr").classList.remove("hidden");
  } catch {
    if (pw === LOCAL_ADMIN_PASSWORD) {
      useLocalAuth = true;
      sessionStorage.setItem(SESSION_KEY, "1");
      initEditor();
    } else {
      document.getElementById("loginErr").classList.remove("hidden");
    }
  }
});

document.getElementById("password").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("loginBtn").click();
});

document.getElementById("logoutBtn").addEventListener("click", async () => {
  try {
    await fetch("/api/logout", { method: "POST", credentials: "include" });
  } catch (_) {}
  sessionStorage.removeItem(SESSION_KEY);
  useLocalAuth = false;
  setStatus("");
  showLogin();
});

document.getElementById("saveBtn").addEventListener("click", saveMenu);

document.getElementById("addCatBtn").addEventListener("click", () => {
  const ci = menuData.categories.length;
  menuData.categories.push({
    group: "New Category",
    eyebrow: "",
    intro: "",
    items: []
  });
  openCategories = new Set([ci]);
  pendingFocus = { type: "category", ci };
  pendingMessage = "New category added — name it and add dishes below.";
  renderCategories();
});

async function initEditor() {
  try {
    await loadMenuData();
    openCategories = new Set(menuData.categories.length ? [0] : []);
    showEditor();
    renderCategories();
  } catch {
    alert("Could not load the menu.");
    sessionStorage.removeItem(SESSION_KEY);
    showLogin();
  }
}

if (isLoggedIn()) initEditor();
else showLogin();
</script>
</body>
</html>
