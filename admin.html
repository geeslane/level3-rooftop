<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Menu Admin | Level 3 Rooftop</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Cinzel&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--burgundy:#6B0F1A;--gold:#C9A96E;--black:#0A0A0A;--charcoal:#1A1A1A;--white:#fff;--font-serif:'Cormorant Garamond',Georgia,serif;--font-display:'Cinzel',serif;--font-sans:'Jost',sans-serif;}
body{background:var(--black);color:var(--white);font-family:var(--font-sans);font-weight:300;min-height:100vh;}
a{color:var(--gold);}
header{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 2rem;border-bottom:1px solid rgba(201,169,110,0.15);}
.logo{font-family:var(--font-display);font-size:0.95rem;letter-spacing:0.2em;color:var(--gold);text-decoration:none;}
.wrap{max-width:900px;margin:0 auto;padding:2rem;}
h1{font-family:var(--font-display);font-size:1.6rem;font-weight:400;margin-bottom:0.5rem;}
.sub{color:rgba(255,255,255,0.45);font-size:0.9rem;line-height:1.6;margin-bottom:1.5rem;}
.panel{background:var(--charcoal);border:1px solid rgba(255,255,255,0.08);padding:2rem;margin-bottom:1.5rem;}
label{display:block;font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:0.4rem;}
input[type=text],input[type=password],textarea{width:100%;background:#111;border:1px solid rgba(255,255,255,0.12);color:var(--white);padding:0.75rem 1rem;font-family:var(--font-sans);font-size:0.9rem;margin-bottom:1rem;}
.password-wrap{position:relative;margin-bottom:1rem;}
.password-wrap input{margin-bottom:0;padding-right:2.75rem;}
.password-toggle{position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,0.4);cursor:pointer;padding:0.25rem;line-height:0;display:flex;align-items:center;justify-content:center;}
.password-toggle:hover{color:var(--gold);}
.password-toggle svg{width:1.15rem;height:1.15rem;fill:none;stroke:currentColor;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round;}
textarea{min-height:80px;resize:vertical;}
.btn{display:inline-block;padding:0.75rem 1.5rem;background:var(--burgundy);border:1px solid #C4394F;color:var(--white);font-family:var(--font-sans);font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;text-decoration:none;}
.btn:hover{opacity:0.9;}
.btn:disabled{opacity:0.5;cursor:not-allowed;}
.btn-ghost{background:transparent;border-color:rgba(255,255,255,0.2);}
.btn-sm{padding:0.45rem 0.9rem;font-size:0.62rem;}
.btn-danger{border-color:#8B1A28;background:#4A0A12;}
.toolbar{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:0.75rem;margin-bottom:1rem;position:sticky;top:0;z-index:10;background:var(--black);padding:0.75rem 0;border-bottom:1px solid rgba(255,255,255,0.06);}
.toolbar-left,.toolbar-right{display:flex;flex-wrap:wrap;gap:0.75rem;align-items:center;}
.status{font-size:0.88rem;margin-bottom:1.25rem;padding:0.65rem 0;min-height:1.4rem;}
.status.ok{color:#8ecf8e;}
.status.err{color:#C4394F;}
.cat{border:1px solid rgba(255,255,255,0.08);margin-bottom:1.25rem;scroll-margin-top:5rem;transition:border-color 0.4s,box-shadow 0.4s;border-radius:2px;overflow:hidden;}
.cat.open{border-color:rgba(201,169,110,0.35);}
.cat.cat-new{border-color:var(--gold);box-shadow:0 0 0 1px rgba(201,169,110,0.45);}
.cat-head{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:1rem 1.25rem;background:#141414;cursor:pointer;user-select:none;}
.cat-head h2{font-family:var(--font-serif);font-size:1.15rem;font-weight:500;}
.cat-chevron{color:var(--gold);font-size:0.75rem;transition:transform 0.25s;flex-shrink:0;}
.cat.open .cat-chevron{transform:rotate(180deg);}
.cat-body{padding:0;display:none;}
.cat.open .cat-body{display:block;}
.section{padding:1.25rem 1.25rem 0;}
.section-label{font-size:0.62rem;letter-spacing:0.28em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;padding-bottom:0.5rem;border-bottom:1px solid rgba(201,169,110,0.2);}
.section-dishes{background:rgba(255,255,255,0.02);padding:1.25rem;border-top:1px solid rgba(255,255,255,0.06);}
.dishes-header{display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:1rem;flex-wrap:wrap;}
.dishes-header h3{font-family:var(--font-serif);font-size:1rem;font-weight:500;color:rgba(255,255,255,0.85);}
.dishes-empty{text-align:center;padding:1.5rem 1rem;color:rgba(255,255,255,0.35);font-size:0.88rem;border:1px dashed rgba(255,255,255,0.1);margin-bottom:1rem;}
.dishes-footer{padding-top:0.5rem;margin-top:0.5rem;border-top:1px solid rgba(255,255,255,0.05);}
.cat-footer{padding:1rem 1.25rem 1.25rem;border-top:1px solid rgba(255,255,255,0.06);background:rgba(74,10,18,0.15);}
.cat-footer p{font-size:0.75rem;color:rgba(255,255,255,0.35);margin-bottom:0.75rem;}
.item{background:#111;border:1px solid rgba(255,255,255,0.08);margin-bottom:1rem;scroll-margin-top:5rem;}
.item.item-new{border-color:var(--gold);box-shadow:0 0 0 1px rgba(201,169,110,0.3);}
.item-head{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:0.75rem 1rem;background:#161616;border-bottom:1px solid rgba(255,255,255,0.06);}
.item-head span{font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.45);}
.item-body{padding:1rem 1rem 0.25rem;}
.item-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 1rem;}
.photo-box{display:flex;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap;}
.photo-preview-wrap{width:120px;aspect-ratio:4/3;background:#0a0a0a;border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;}
.item-preview{width:100%;height:100%;object-fit:cover;display:block;}
.photo-placeholder{font-size:0.7rem;color:rgba(255,255,255,0.3);text-align:center;padding:0.5rem;}
.photo-actions{display:flex;flex-direction:column;gap:0.5rem;}
.upload-label{cursor:pointer;margin:0;}
.hidden-file{display:none;}
.upload-hint{font-size:0.75rem;color:rgba(255,255,255,0.4);}
.btn-add{background:rgba(201,169,110,0.12);border-color:var(--gold);color:var(--gold);}
.btn-add:hover{background:rgba(201,169,110,0.2);}
.btn-text{background:none;border:none;color:rgba(255,255,255,0.4);font-family:var(--font-sans);font-size:0.62rem;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;padding:0.35rem 0;}
.btn-text:hover{color:#C4394F;}
.btn-block{display:block;width:100%;text-align:center;}
.add-category-wrap{margin-top:1.5rem;padding-top:1.5rem;border-top:1px dashed rgba(255,255,255,0.1);text-align:center;}
.err{color:#C4394F;font-size:0.85rem;margin-top:0.5rem;}
.hidden{display:none;}
.empty-cats{text-align:center;padding:3rem 1rem;color:rgba(255,255,255,0.4);border:1px dashed rgba(255,255,255,0.12);}
@media(max-width:700px){.item-grid{grid-template-columns:1fr;}.wrap{padding:1.25rem;}}
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">LEVEL 3 ADMIN</a>
</header>

<div class="wrap">
  <div id="loginView">
    <h1>Menu Admin</h1>
    <p class="sub">Sign in with your admin password to edit the menu.</p>
    <div class="panel">
      <label for="password">Password</label>
      <div class="password-wrap">
        <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
        <button type="button" class="password-toggle" id="togglePassword" aria-label="Show password" aria-pressed="false">
          <svg id="eyeShow" viewBox="0 0 24 24" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg id="eyeHide" class="hidden" viewBox="0 0 24 24" aria-hidden="true"><path d="M9.9 4.24A10.94 10.94 0 0 1 12 4c6.5 0 10 7 10 7a18.2 18.2 0 0 1-2.16 3.19"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/><path d="M1 1l22 22"/><path d="M6.7 6.7C4.06 8.28 2.2 10.6 2 12s3.5 7 10 7a10.9 10.9 0 0 0 5.3-1.38"/></svg>
        </button>
      </div>
      <p class="err hidden" id="loginErr">Incorrect password.</p>
      <button class="btn" type="button" id="loginBtn">Sign In</button>
    </div>
  </div>

  <div id="editorView" class="hidden">
    <h1>Edit Menu</h1>
    <p class="sub">Edit your menu below, then click <strong>Save</strong> when you're done.</p>

    <div class="toolbar">
      <div class="toolbar-left">
        <button class="btn" type="button" id="saveBtn">Save</button>
        <a class="btn btn-ghost" href="menu.html" target="_blank">Preview menu</a>
      </div>
      <div class="toolbar-right">
        <button class="btn btn-ghost" type="button" id="logoutBtn">Sign Out</button>
      </div>
    </div>

    <p class="status" id="statusMsg"></p>
    <div id="categories"></div>
    <div class="add-category-wrap">
      <button class="btn btn-add" type="button" id="addCatBtn">+ Add new category</button>
    </div>
  </div>
</div>

<script>
const MAX_IMAGE_BYTES = 4 * 1024 * 1024;

let menuData = { categories: [] };
let openCategories = new Set();
let pendingFocus = null;
let pendingMessage = "";

const loginView = document.getElementById("loginView");
const editorView = document.getElementById("editorView");
const categoriesEl = document.getElementById("categories");
const statusMsg = document.getElementById("statusMsg");

function setStatus(msg, type) {
  statusMsg.textContent = msg;
  statusMsg.className = "status" + (type ? " " + type : "");
}

function showLogin() {
  loginView.classList.remove("hidden");
  editorView.classList.add("hidden");
}

function showEditor() {
  loginView.classList.add("hidden");
  editorView.classList.remove("hidden");
}

async function loadMenuData() {
  try {
    const res = await fetch("/api/menu", { credentials: "include" });
    if (res.ok) {
      const data = await res.json();
      menuData = data.categories ? data : { categories: data };
      return;
    }
  } catch (_) {}

  const res = await fetch("content/menu.json");
  if (!res.ok) throw new Error("Could not load menu");
  menuData = await res.json();
  if (!menuData.categories) menuData = { categories: menuData };
}

function esc(str) {
  return String(str ?? "")
    .replace(/&/g, "&amp;")
    .replace(/"/g, "&quot;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function encodeImagePath(path) {
  return path.split("/").map(encodeURIComponent).join("/");
}

function itemTemplate(ci, ii, item) {
  const isNew = pendingFocus?.type === "item" && pendingFocus.ci === ci && pendingFocus.ii === ii;
  const dishNum = ii + 1;
  return `
    <div class="item${isNew ? " item-new" : ""}" data-item data-ci="${ci}" data-ii="${ii}">
      <div class="item-head">
        <span>Dish ${dishNum}</span>
        <button class="btn-text" type="button" data-remove-item>Remove</button>
      </div>
      <div class="item-body">
        <label>Photo</label>
        <div class="photo-box">
          <div class="photo-preview-wrap">
            ${item.image
              ? `<img class="item-preview" src="${encodeImagePath(item.image)}" alt="" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'photo-placeholder',textContent:'No photo'}))">`
              : `<div class="photo-placeholder">No photo</div>`}
          </div>
          <div class="photo-actions">
            <label class="btn btn-sm btn-ghost upload-label">
              ${item.image ? "Change photo" : "Upload photo"}
              <input type="file" accept="image/jpeg,image/png,image/webp,image/jpg" class="hidden-file" data-upload>
            </label>
            <span class="upload-hint" data-upload-hint>${item.image ? "Photo ready" : "JPG or PNG, max 4 MB"}</span>
          </div>
        </div>
        <label>Dish name</label>
        <input type="text" data-item-field="name" value="${esc(item.name)}" placeholder="e.g. Golden Plantain Cups">
        <label>Description</label>
        <textarea data-item-field="desc" placeholder="Short description of the dish">${esc(item.desc)}</textarea>
        <label>Badge <span style="text-transform:none;letter-spacing:0;color:rgba(255,255,255,0.35);">(optional)</span></label>
        <input type="text" data-item-field="badge" value="${esc(item.badge || "")}" placeholder="Signature, Popular…">
      </div>
    </div>
  `;
}

function renderCategories() {
  if (!menuData.categories.length) {
    categoriesEl.innerHTML = `<div class="empty-cats">No categories yet. Click <strong>+ Add new category</strong> below to get started.</div>`;
    return;
  }

  categoriesEl.innerHTML = menuData.categories.map((cat, ci) => `
    <div class="cat${openCategories.has(ci) ? " open" : ""}${pendingFocus?.type === "category" && pendingFocus.ci === ci ? " cat-new" : ""}" data-ci="${ci}">
      <div class="cat-head" data-toggle>
        <h2>${esc(cat.group || "Untitled")} <span style="color:rgba(255,255,255,0.35);font-size:0.85rem;">(${cat.items.length} dish${cat.items.length === 1 ? "" : "es"})</span></h2>
        <span class="cat-chevron">▼</span>
      </div>
      <div class="cat-body">
        <div class="section">
          <div class="section-label">Category details</div>
          <div class="item-grid">
            <div>
              <label>Category name</label>
              <input type="text" data-field="group" value="${esc(cat.group)}" placeholder="e.g. Starters">
            </div>
            <div>
              <label>Subtitle</label>
              <input type="text" data-field="eyebrow" value="${esc(cat.eyebrow)}" placeholder="e.g. To Begin">
            </div>
          </div>
          <label>Description</label>
          <textarea data-field="intro" placeholder="Short intro for this section">${esc(cat.intro)}</textarea>
        </div>

        <div class="section-dishes">
          <div class="dishes-header">
            <h3>Dishes in this category</h3>
            <button class="btn btn-sm btn-add" type="button" data-add-item>+ Add dish</button>
          </div>
          <div data-items>
            ${cat.items.length
              ? cat.items.map((item, ii) => itemTemplate(ci, ii, item)).join("")
              : `<div class="dishes-empty">No dishes yet. Click <strong>+ Add dish</strong> above to add one.</div>`}
          </div>
          ${cat.items.length ? `<div class="dishes-footer"><button class="btn btn-sm btn-add btn-block" type="button" data-add-item-bottom>+ Add another dish</button></div>` : ""}
        </div>

        <div class="cat-footer">
          <p>Deleting a category removes all its dishes permanently.</p>
          <button class="btn btn-sm btn-danger btn-block" type="button" data-remove-cat>Delete this category</button>
        </div>
      </div>
    </div>
  `).join("");

  categoriesEl.querySelectorAll("[data-toggle]").forEach(head => {
    head.addEventListener("click", () => {
      const cat = head.closest(".cat");
      const ci = Number(cat.dataset.ci);
      if (openCategories.has(ci)) openCategories.delete(ci);
      else openCategories.add(ci);
      cat.classList.toggle("open");
    });
  });

  categoriesEl.querySelectorAll(".cat").forEach(catEl => {
    const ci = Number(catEl.dataset.ci);

    function addDish(e) {
      e?.stopPropagation();
      const ii = menuData.categories[ci].items.length;
      menuData.categories[ci].items.push({ name: "", desc: "", image: "" });
      openCategories = new Set([ci]);
      pendingFocus = { type: "item", ci, ii };
      pendingMessage = "New dish added — fill in the details below.";
      renderCategories();
    }

    catEl.querySelectorAll("[data-field]").forEach(input => {
      input.addEventListener("input", () => {
        menuData.categories[ci][input.dataset.field] = input.value;
        if (input.dataset.field === "group") {
          catEl.querySelector(".cat-head h2").innerHTML =
            `${esc(input.value || "Untitled")} <span style="color:rgba(255,255,255,0.35);font-size:0.85rem;">(${menuData.categories[ci].items.length} dish${menuData.categories[ci].items.length === 1 ? "" : "es"})</span>`;
        }
      });
    });

    catEl.querySelector("[data-add-item]")?.addEventListener("click", addDish);
    catEl.querySelector("[data-add-item-bottom]")?.addEventListener("click", addDish);

    catEl.querySelector("[data-remove-cat]")?.addEventListener("click", e => {
      e.stopPropagation();
      if (!confirm(`Delete "${menuData.categories[ci].group}" and all ${menuData.categories[ci].items.length} dish(es)?`)) return;
      menuData.categories.splice(ci, 1);
      openCategories = new Set([Math.min(ci, menuData.categories.length - 1)].filter(i => i >= 0));
      renderCategories();
      setStatus("Category deleted. Click Save when ready.", "ok");
    });

    catEl.querySelectorAll("[data-item]").forEach(itemEl => {
      const ii = Number(itemEl.dataset.ii);

      itemEl.querySelectorAll("[data-item-field]").forEach(input => {
        input.addEventListener("input", () => {
          const field = input.dataset.itemField;
          if (field === "badge" && !input.value.trim()) {
            delete menuData.categories[ci].items[ii].badge;
          } else {
            menuData.categories[ci].items[ii][field] = input.value;
          }
        });
      });

      itemEl.querySelector("[data-upload]")?.addEventListener("change", async e => {
        const file = e.target.files?.[0];
        if (file) await handleImageUpload(file, ci, ii, itemEl);
        e.target.value = "";
      });

      itemEl.querySelector("[data-remove-item]")?.addEventListener("click", e => {
        e.stopPropagation();
        const name = menuData.categories[ci].items[ii].name || `Dish ${ii + 1}`;
        if (!confirm(`Remove "${name}"?`)) return;
        menuData.categories[ci].items.splice(ii, 1);
        openCategories.add(ci);
        renderCategories();
        setStatus("Dish removed. Click Save when ready.", "ok");
      });
    });
  });

  applyPendingFocus();
}

function applyPendingFocus() {
  if (!pendingFocus) return;

  const message = pendingMessage;
  pendingMessage = "";

  requestAnimationFrame(() => {
    if (pendingFocus.type === "category") {
      const el = categoriesEl.querySelector(`[data-ci="${pendingFocus.ci}"]`);
      el?.scrollIntoView({ behavior: "smooth", block: "start" });
      el?.querySelector('[data-field="group"]')?.focus({ preventScroll: true });
    } else if (pendingFocus.type === "item") {
      const el = categoriesEl.querySelector(`[data-item][data-ci="${pendingFocus.ci}"][data-ii="${pendingFocus.ii}"]`);
      el?.scrollIntoView({ behavior: "smooth", block: "center" });
      el?.querySelector('[data-item-field="name"]')?.focus({ preventScroll: true });
    }
    if (message) setStatus(message, "ok");
    pendingFocus = null;
  });
}

function readFileBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function handleImageUpload(file, ci, ii, itemEl) {
  const hint = itemEl.querySelector("[data-upload-hint]");

  if (file.size > MAX_IMAGE_BYTES) {
    setStatus("Image must be under 4 MB.", "err");
    return;
  }

  hint.textContent = "Uploading…";
  setStatus("Uploading photo to GitHub…");

  try {
    const content = await readFileBase64(file);
    const res = await fetch("/api/upload", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: "include",
      body: JSON.stringify({ filename: file.name, content }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || "Upload failed");

    menuData.categories[ci].items[ii].image = data.path;
    openCategories.add(ci);
    pendingFocus = { type: "item", ci, ii };
    renderCategories();
    setStatus("Photo uploaded. Click Save to update the menu.", "ok");
  } catch (err) {
    hint.textContent = "Upload failed — try again";
    setStatus(err.message || "Could not upload photo.", "err");
  }
}

async function saveMenu() {
  const saveBtn = document.getElementById("saveBtn");
  saveBtn.disabled = true;
  setStatus("Saving to GitHub…");

  menuData.categories.forEach(cat => {
    cat.items.forEach(item => {
      if (!item.badge?.trim()) delete item.badge;
    });
  });

  try {
    const res = await fetch("/api/menu", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: "include",
      body: JSON.stringify(menuData),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || "Save failed");
    setStatus("Saved — menu is live (may take a few seconds to appear).", "ok");
  } catch (err) {
    setStatus(err.message || "Could not save.", "err");
  } finally {
    saveBtn.disabled = false;
  }
}

document.getElementById("loginBtn").addEventListener("click", async () => {
  const pw = document.getElementById("password").value;
  const loginBtn = document.getElementById("loginBtn");
  const loginErr = document.getElementById("loginErr");
  loginErr.classList.add("hidden");
  loginBtn.disabled = true;

  try {
    const res = await fetch("/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: "include",
      body: JSON.stringify({ password: pw }),
    });
    const data = await res.json().catch(() => ({}));

    if (res.ok) {
      document.getElementById("password").value = "";
      initEditor();
      return;
    }

    if (res.status === 404) {
      loginErr.textContent = "Login API not found. Push the api/ folder and redeploy on Vercel.";
    } else if (res.status === 503) {
      loginErr.textContent = data.error || "ADMIN_PASSWORD is not set in Vercel environment variables.";
    } else {
      loginErr.textContent = data.error || "Incorrect password.";
    }
    loginErr.classList.remove("hidden");
  } catch {
    loginErr.textContent = "Could not reach the server. Check your connection and try again.";
    loginErr.classList.remove("hidden");
  } finally {
    loginBtn.disabled = false;
  }
});

document.getElementById("password").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("loginBtn").click();
});

document.getElementById("togglePassword").addEventListener("click", () => {
  const input = document.getElementById("password");
  const btn = document.getElementById("togglePassword");
  const show = input.type === "password";
  input.type = show ? "text" : "password";
  document.getElementById("eyeShow").classList.toggle("hidden", show);
  document.getElementById("eyeHide").classList.toggle("hidden", !show);
  btn.setAttribute("aria-label", show ? "Hide password" : "Show password");
  btn.setAttribute("aria-pressed", show ? "true" : "false");
});

document.getElementById("logoutBtn").addEventListener("click", async () => {
  try {
    await fetch("/api/logout", { method: "POST", credentials: "include" });
  } catch (_) {}
  setStatus("");
  showLogin();
});

document.getElementById("saveBtn").addEventListener("click", saveMenu);

document.getElementById("addCatBtn").addEventListener("click", () => {
  const ci = menuData.categories.length;
  menuData.categories.push({
    group: "New Category",
    eyebrow: "",
    intro: "",
    items: []
  });
  openCategories = new Set([ci]);
  pendingFocus = { type: "category", ci };
  pendingMessage = "New category added — fill in the details below.";
  renderCategories();
});

async function initEditor() {
  try {
    await loadMenuData();
    openCategories = new Set(menuData.categories.length ? [0] : []);
    showEditor();
    renderCategories();
  } catch {
    alert("Could not load the menu.");
    showLogin();
  }
}

async function boot() {
  try {
    const res = await fetch("/api/login", { credentials: "include" });
    if (res.ok) await initEditor();
    else showLogin();
  } catch {
    showLogin();
  }
}

boot();
</script>
</body>
</html>
